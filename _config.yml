# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Sivani Baskaran
email: mailto:sivanibaskaran1@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Environmental Chemist | Scientific Consultant | Educator | Data Analysis, Research, Policy
url: "https://sivanibaskaran.github.io"
baseurl: ""
minimal_mistakes_skin: contrast
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes@4.27.3
#theme: minimal-mistakes-jekyll
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

atom_feed:
  hide: true

author:
  name   : ""
  avatar : "/assets/images/profile.jpg"
  bio    : "PhD Chemist offering tutoring and environmental chemistry research and consulting services."
  tagline: "Environmental Chemist | Scientific Consultant | Educator"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:sivanibaskaran1@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sivanibaskaran/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sivanibaskaran/"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0001-6192-5072"

footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:sivanibaskaran1@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sivanibaskaran/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sivanibaskaran/"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0001-6192-5072"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # home page
  - scope:
      path: "index.html"
    values:
      layout: home
      author_profile: true
      title: ""

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
